<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Когніторіум — Новини</title>
  <meta name="description" content="Стрічка AI-новин з офіційних першоджерел. Тільки офіційні блоги компаній, без медіа-шуму." />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FAF8F2;
      --bg-card: #F3F0E8;
      --bg-card-hover: #EBE8DF;
      --text: #1A1A1A;
      --text-secondary: #555555;
      --text-muted: #888888;
      --accent: #1A1A1A;
      --accent-line: #1A1A1A;
      --border: rgba(26,26,26,0.08);
      --border-strong: rgba(26,26,26,0.15);
      --nav-bg: #FAF8F2;
      --nav-border: rgba(26,26,26,0.08);
      --tag: #E4DFD4;
      --tag-text: #444444;
      --tag-active: #1A1A1A;
      --tag-active-text: #FAF8F2;
      --filter-bg: rgba(26,26,26,0.05);
      --filter-border: rgba(26,26,26,0.10);
      --filter-active-bg: #1A1A1A;
      --filter-active-text: #FAF8F2;
      --filter-inactive-text: #555555;
      --switch-bg: #1A1A1A;
      --switch-thumb: #FAF8F2;
    }

    [data-theme="dark"] {
      --bg: #1C1C1C;
      --bg-card: #242424;
      --bg-card-hover: #2C2C2C;
      --text: #E8E8E8;
      --text-secondary: #AAAAAA;
      --text-muted: #666666;
      --accent: #7DBF82;
      --accent-line: #7DBF82;
      --border: rgba(255,255,255,0.07);
      --border-strong: rgba(255,255,255,0.13);
      --nav-bg: #181818;
      --nav-border: rgba(255,255,255,0.06);
      --tag: #424242;
      --tag-text: #9DBF82;
      --tag-active: #7DBF82;
      --tag-active-text: #1C1C1C;
      --filter-bg: rgba(255,255,255,0.04);
      --filter-border: rgba(255,255,255,0.08);
      --filter-active-bg: #7DBF82;
      --filter-active-text: #1C1C1C;
      --filter-inactive-text: #AAAAAA;
      --switch-bg: #7DBF82;
      --switch-thumb: #1C1C1C;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.4s ease, color 0.4s ease;
    }

    /* NAV */
    nav {
      background: var(--nav-bg);
      border-bottom: 1px solid var(--nav-border);
      padding: 0.9rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
      transition: background 0.4s ease, border-color 0.4s ease;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    .nav-logo svg {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }

    .nav-logo-text {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
    }

    .nav-logo-name {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1;
      white-space: nowrap;
      transition: color 0.4s ease;
    }

    .nav-tagline {
      font-size: 0.76rem;
      font-weight: 400;
      letter-spacing: 0.01em;
      color: var(--text-muted);
      white-space: nowrap;
      transition: color 0.4s ease;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      flex-wrap: nowrap;
    }

    .nav-link {
      font-size: 0.78rem;
      font-weight: 400;
      color: var(--text-secondary);
      cursor: pointer;
      border-bottom: 1.5px solid transparent;
      padding-bottom: 1px;
      transition: color 0.2s ease, border-color 0.2s ease;
      white-space: nowrap;
      user-select: none;
    }

    .nav-link.active {
      font-weight: 600;
      color: var(--text);
      border-bottom-color: var(--accent-line);
    }

    .nav-divider {
      width: 1px;
      height: 14px;
      background: var(--border-strong);
      flex-shrink: 0;
    }

    .lang-btn {
      background: none;
      border: 1px solid var(--border-strong);
      border-radius: 2rem;
      padding: 0.25rem 0.7rem;
      cursor: pointer;
      color: var(--text-secondary);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      white-space: nowrap;
      transition: all 0.2s ease;
    }

    .lang-btn:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    /* THEME SWITCH */
    .theme-switch {
      display: flex;
      align-items: center;
      background: none;
      border: 1px solid var(--border-strong);
      border-radius: 2rem;
      padding: 0.3rem 0.45rem;
      cursor: pointer;
      transition: all 0.25s ease;
      flex-shrink: 0;
    }

    .switch-track {
      width: 2rem;
      height: 1.1rem;
      border-radius: 1rem;
      background: var(--switch-bg);
      position: relative;
      transition: background 0.3s ease;
    }

    .switch-thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: calc(1.1rem - 4px);
      height: calc(1.1rem - 4px);
      border-radius: 50%;
      background: var(--switch-thumb);
      transition: left 0.3s cubic-bezier(0.16, 1, 0.3, 1), background 0.3s ease;
    }

    [data-theme="dark"] .switch-thumb {
      left: calc(100% - 1rem - 2px);
    }

    /* MAIN CONTENT */
    .main {
      max-width: 800px;
      margin: 0 auto;
      padding: 3.5rem 2rem 5rem;
    }

    /* PAGE HEADER */
    .page-header {
      margin-bottom: 2.5rem;
    }

    .page-header-top {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 0.5rem;
    }

    .page-title {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(1.6rem, 4vw, 2.1rem);
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1.05;
      transition: color 0.4s ease;
    }

    .page-count {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--text-muted);
      transition: color 0.4s ease;
    }

    .accent-line {
      width: 2.5rem;
      height: 1.5px;
      background: var(--accent-line);
      margin-bottom: 0.7rem;
      transition: background 0.4s ease;
    }

    .page-subtitle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .dot-accent {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      transition: background 0.4s ease;
    }

    .subtitle-text {
      font-size: 0.72rem;
      color: var(--text-muted);
      transition: color 0.4s ease;
    }

    /* FILTERS */
    .filters {
      margin-bottom: 2.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .filter-btn {
      padding: 5px 13px;
      border-radius: 2rem;
      border: 1px solid var(--filter-border);
      background: var(--filter-bg);
      color: var(--filter-inactive-text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .filter-btn.secondary {
      font-size: 0.63rem;
      opacity: 0.7;
    }

    .filter-btn.active {
      background: var(--filter-active-bg);
      border-color: var(--filter-active-bg);
      color: var(--filter-active-text);
      font-weight: 600;
    }

    /* WEEK GROUP */
    .week-group {
      margin-bottom: 2.5rem;
    }

    .week-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .week-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      white-space: nowrap;
      transition: color 0.4s ease;
    }

    .week-line {
      flex: 1;
      height: 1px;
      background: var(--border);
      transition: background 0.4s ease;
    }

    .week-count {
      font-size: 0.56rem;
      color: var(--text-muted);
      transition: color 0.4s ease;
    }

    /* NEWS LIST */
    .news-list {
      display: flex;
      flex-direction: column;
      gap: 1.5px;
      background: var(--border);
    }

    /* NEWS CARD */
    .news-card {
      background: var(--bg-card);
      padding: 1.25rem 1.5rem;
      cursor: pointer;
      transition: background 0.2s ease;
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      text-decoration: none;
      color: inherit;
    }

    .news-card:hover {
      background: var(--bg-card-hover);
    }

    .news-card:hover .card-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    .card-dot-wrap {
      flex-shrink: 0;
      margin-top: 6px;
    }

    .card-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .card-body {
      flex: 1;
      min-width: 0;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 0.45rem;
      flex-wrap: wrap;
    }

    .card-source {
      font-size: 0.65rem;
      font-weight: 600;
    }

    .card-date {
      font-size: 0.62rem;
      color: var(--text-muted);
      transition: color 0.4s ease;
    }

    .card-tag {
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--tag-text);
      background: var(--tag);
      padding: 0 8px;
      border-radius: 3px;
      height: 20px;
      display: inline-flex;
      align-items: center;
      transition: background 0.4s ease, color 0.4s ease;
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text);
      margin-bottom: 0.45rem;
      letter-spacing: -0.01em;
      transition: color 0.4s ease;
    }

    .card-desc {
      font-size: 0.77rem;
      line-height: 1.6;
      color: var(--text-secondary);
      transition: color 0.4s ease;
    }

    .card-arrow {
      flex-shrink: 0;
      color: var(--accent-line);
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
      transform: translateX(-4px);
      margin-top: 5px;
    }

    /* LOAD MORE */
    .load-more-wrap {
      display: flex;
      justify-content: center;
      margin-top: 1rem;
    }

    .load-more-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-secondary);
      background: none;
      border: 1px solid var(--border-strong);
      border-radius: 2rem;
      padding: 0.6rem 1.6rem;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: all 0.2s ease;
    }

    .load-more-btn:hover {
      color: var(--text);
      border-color: var(--accent);
    }
  </style>
</head>

    /* ── STATE ── */
    let lang = 'ua';
    let theme = 'light';
    let activeFilter = 'all';

    /* ── RENDER ── */
    function itemMatchesFilter(item) {
      if (activeFilter === 'all') return true;
      if (activeFilter === 'top labs') return TOP_LAB_SOURCES.includes(item.source);
      return item.tag === activeFilter;
    }

    function countCurrentWeek() {
      return NEWS[0].items.filter(itemMatchesFilter).length;
    }

    function updatePageTexts() {
      const L = i18n[lang];
      const TL = TAG_LABELS[lang];
      const NAV = NAV_ITEMS[lang];

      document.getElementById('tagline').textContent = L.tagline;
      document.getElementById('pageTitle').textContent = L.title;
      document.getElementById('pageCount').textContent = countCurrentWeek() + ' ' + L.itemsWeek;
      document.getElementById('subtitleText').textContent = L.subtitle + ' · ' + L.updated;
      document.getElementById('langBtn').textContent = L.langSwitch;
      document.getElementById('loadMoreBtn').textContent = L.loadMore;

      // Nav
      document.querySelectorAll('.nav-link').forEach(el => {
        const key = el.dataset.nav;
        if (NAV[key]) el.textContent = NAV[key];
      });

      // Filters
      document.querySelectorAll('.filter-btn').forEach(btn => {
        const tag = btn.dataset.tag;
        btn.textContent = TL[tag];
      });

      // News cards
      document.querySelectorAll('.news-card').forEach(card => {
        const id = parseInt(card.dataset.id);
        const item = findNewsItem(id);
        if (!item) return;
        card.querySelector('.card-date').textContent = lang === 'ua' ? item.date : item.date_en;
        card.querySelector('.card-tag').textContent = TL[item.tag];
        card.querySelector('.card-title').textContent = lang === 'ua' ? item.ua : item.en;
        card.querySelector('.card-desc').textContent = lang === 'ua' ? item.desc_ua : item.desc_en;
      });

      // Week labels
      document.querySelectorAll('.week-label').forEach(el => {
        const isCurrentWeek = el.dataset.currentweek === 'true';
        const weekUa = el.dataset.weekua;
        const weekEn = el.dataset.weeken;
        el.textContent = isCurrentWeek ? L.thisWeek : (lang === 'ua' ? weekUa : weekEn);
      });
    }

    function findNewsItem(id) {
      for (const week of NEWS) {
        const found = week.items.find(i => i.id === id);
        if (found) return found;
      }
      return null;
    }

    function renderFilters() {
      const filtersEl = document.getElementById('filters');
      const TL = TAG_LABELS[lang];
      filtersEl.innerHTML = '';
      TAGS.forEach(tag => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (SECONDARY_TAGS.includes(tag) ? ' secondary' : '') + (activeFilter === tag ? ' active' : '');
        btn.dataset.tag = tag;
        btn.textContent = TL[tag];
        btn.addEventListener('click', () => {
          activeFilter = tag;
          renderFilters();
          renderNews();
          updatePageTexts();
        });
        filtersEl.appendChild(btn);
      });
    }

    function renderNews() {
      const container = document.getElementById('newsContainer');
      const TL = TAG_LABELS[lang];
      const L = i18n[lang];
      container.innerHTML = '';

      NEWS.forEach(week => {
        const visible = week.items.filter(itemMatchesFilter);
        if (visible.length === 0) return;

        const groupEl = document.createElement('div');
        groupEl.className = 'week-group';

        // Week header
        const headerEl = document.createElement('div');
        headerEl.className = 'week-header';

        const labelEl = document.createElement('span');
        labelEl.className = 'week-label';
        labelEl.dataset.currentweek = week.isCurrentWeek ? 'true' : 'false';
        labelEl.dataset.weekua = week.week;
        labelEl.dataset.weeken = week.week_en;
        labelEl.textContent = week.isCurrentWeek ? L.thisWeek : (lang === 'ua' ? week.week : week.week_en);

        const lineEl = document.createElement('div');
        lineEl.className = 'week-line';

        const countEl = document.createElement('span');
        countEl.className = 'week-count';
        countEl.textContent = visible.length;

        headerEl.appendChild(labelEl);
        headerEl.appendChild(lineEl);
        headerEl.appendChild(countEl);
        groupEl.appendChild(headerEl);

        // News list
        const listEl = document.createElement('div');
        listEl.className = 'news-list';

        visible.forEach(item => {
          const srcColor = SOURCE_COLORS[item.source] || '#888888';
          const card = document.createElement('div');
          card.className = 'news-card';
          card.dataset.id = item.id;
          card.innerHTML = `
            <div class="card-dot-wrap">
              <div class="card-dot" style="background:${srcColor}"></div>
            </div>
            <div class="card-body">
              <div class="card-meta">
                <span class="card-source" style="color:${srcColor}">${item.source}</span>
                <span class="card-date">${lang === 'ua' ? item.date : item.date_en}</span>
                <span class="card-tag">${TL[item.tag]}</span>
              </div>
              <div class="card-title">${lang === 'ua' ? item.ua : item.en}</div>
              <p class="card-desc">${lang === 'ua' ? item.desc_ua : item.desc_en}</p>
            </div>
            <div class="card-arrow">→</div>
          `;
          listEl.appendChild(card);
        });

        groupEl.appendChild(listEl);
        container.appendChild(groupEl);
      });
    }

    /* ── INIT ── */
    renderFilters();
    renderNews();

    /* ── LANGUAGE TOGGLE ── */
    document.getElementById('langBtn').addEventListener('click', () => {
      lang = lang === 'ua' ? 'en' : 'ua';
      renderFilters();
      renderNews();
      updatePageTexts();
    });

    /* ── THEME TOGGLE ── */
    document.getElementById('themeSwitch').addEventListener('click', () => {
      theme = theme === 'light' ? 'dark' : 'light';
      document.documentElement.dataset.theme = theme === 'dark' ? 'dark' : '';
      // Update logo ring color
      const ring = document.getElementById('logo-ring');
      if (ring) ring.setAttribute('fill', theme === 'dark' ? '#E8E8E8' : '#1A1A1A');
    });
  </script>
